server {
    listen 80;
    listen [::]:80;
    server_name erp.msexpressinc.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://erp.msexpressinc.net$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name erp.msexpressinc.net;

    ssl_certificate     /etc/letsencrypt/live/erp.msexpressinc.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.msexpressinc.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:MSERP:10m;
    ssl_session_timeout 1d;

    root /opt/mserp/current/frontend;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        client_max_body_size 25m;
    }

    location / {
        try_files $uri.html $uri/index.html $uri =404;
    }
}

# Keep the original IP endpoint available during the domain transition.
