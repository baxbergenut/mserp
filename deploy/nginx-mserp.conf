server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name 137.184.102.22;

    ssl_certificate     /etc/mserp/tls/mserp.crt;
    ssl_certificate_key /etc/mserp/tls/mserp.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:MSERP:10m;
    ssl_session_timeout 1d;

    root /opt/mserp/current/frontend;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        client_max_body_size 25m;
    }

    location / {
        try_files $uri.html $uri/index.html $uri =404;
    }
}
